<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>PádelScore</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent1: #00e5ff;
    --accent2: #ff3d6b;
    --gold: #ffd600;
    --text: #f0f0ff;
    --muted: #555570;
    --green: #00e676;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 1;
    gap: 16px;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ── SETUP SCREEN ── */
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .logo-sub {
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -4px;
  }

  .input-group { width: 100%; max-width: 380px; }
  .input-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .team1-label { color: var(--accent1); }
  .team2-label { color: var(--accent2); }

  .team-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .team-input:focus { border-color: var(--accent1); }
  .team-input.t2:focus { border-color: var(--accent2); }

  .btn-start {
    width: 100%;
    max-width: 380px;
    padding: 20px;
    background: linear-gradient(135deg, var(--accent1), #0090aa);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: #000;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    margin-top: 8px;
  }
  .btn-start:active { transform: scale(0.97); opacity: 0.9; }

  /* ── GAME SCREEN ── */
  #gameScreen {
    padding: 12px 16px;
    gap: 10px;
    justify-content: flex-start;
    padding-top: 20px;
  }

  .bt-bar {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .bt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .bt-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .bt-status { font-size: 12px; color: var(--muted); flex: 1; }
  .btn-bt {
    background: rgba(92,107,192,0.3);
    border: 1px solid rgba(92,107,192,0.5);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    color: #8c9eff;
    cursor: pointer;
    white-space: nowrap;
  }

  .set-info {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Sets scoreboard */
  .sets-board {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .sets-team {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sets-team.t1 { border-right: 1px solid rgba(255,255,255,0.05); }
  .sets-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .sets-name.t1 { color: var(--accent1); }
  .sets-name.t2 { color: var(--accent2); text-align: right; }
  .sets-dots { display: flex; gap: 4px; }
  .sets-dots.t2 { justify-content: flex-end; }
  .set-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    transition: all 0.2s;
  }
  .set-dot.won { border-color: transparent; }
  .set-dot.won.t1 { background: var(--accent1); box-shadow: 0 0 6px var(--accent1); }
  .set-dot.won.t2 { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .sets-mid { padding: 0 12px; color: var(--muted); font-size: 12px; }

  /* Main scoreboard */
  .scoreboard {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .score-row {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    align-items: center;
  }
  .score-cell {
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .score-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .score-divider { color: var(--muted); font-size: 20px; text-align: center; }

  .games-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 1;
    transition: transform 0.15s ease, color 0.2s;
  }
  .games-num.t1 { color: var(--accent1); }
  .games-num.t2 { color: var(--accent2); }
  .games-num.pop { transform: scale(1.2); }

  .points-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    transition: transform 0.15s ease;
    min-width: 80px;
    text-align: center;
  }
  .points-num.t1 { color: var(--green); }
  .points-num.t2 { color: var(--green); }
  .points-num.pop { transform: scale(1.15); }

  .score-sep { background: rgba(255,255,255,0.04); height: 1px; width: 100%; }

  /* Deuce banner */
  .deuce-banner {
    background: linear-gradient(90deg, rgba(255,214,0,0.15), rgba(255,214,0,0.05));
    border-top: 1px solid rgba(255,214,0,0.2);
    padding: 8px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--gold);
    display: none;
  }
  .deuce-banner.show { display: block; }

  /* Action buttons */
  .action-row {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-point {
    padding: 18px 12px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .btn-point::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .btn-point:active::after { opacity: 0.1; }
  .btn-point:active { transform: scale(0.96); }
  .btn-p1 { background: linear-gradient(145deg, #003d6b, #005a9e); color: var(--accent1); border: 1px solid rgba(0,229,255,0.2); }
  .btn-p2 { background: linear-gradient(145deg, #5a0022, #8b0038); color: var(--accent2); border: 1px solid rgba(255,61,107,0.2); }
  .btn-point .hint {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .util-row {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-util {
    padding: 14px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-util:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn-util:active { transform: scale(0.97); }
  .btn-undo { color: #80cbc4; }
  .btn-reset { color: #ff8a65; }

  /* ── WINNER SCREEN ── */
  #winnerScreen { background: var(--bg); gap: 20px; }
  .winner-glow {
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,214,0,0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .trophy { font-size: 80px; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
  }
  .winner-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 3px;
    text-align: center;
    background: linear-gradient(135deg, #fff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .winner-score {
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .btn-newmatch {
    padding: 20px 48px;
    background: linear-gradient(135deg, var(--accent2), #cc0033);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: white;
    cursor: pointer;
    margin-top: 12px;
    transition: transform 0.15s;
  }
  .btn-newmatch:active { transform: scale(0.97); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen active" id="setupScreen">
  <div style="text-align:center">
    <div class="logo">PÁDEL</div>
    <div class="logo" style="margin-top:-16px">SCORE</div>
    <div class="logo-sub">Marcador de partido</div>
  </div>

  <div class="input-group">
    <label class="input-label team1-label">Tu equipo</label>
    <input class="team-input" id="inp1" placeholder="Ej: Los Cracks" maxlength="20">
  </div>
  <div class="input-group">
    <label class="input-label team2-label">Equipo rival</label>
    <input class="team-input t2" id="inp2" placeholder="Ej: Los Rivales" maxlength="20">
  </div>
  <button class="btn-start" onclick="startGame()">EMPEZAR PARTIDO →</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">

  <div class="bt-bar">
    <div class="bt-dot" id="btDot"></div>
    <span class="bt-status" id="btStatus">Botón BT no conectado</span>
    <button class="btn-bt" onclick="connectBluetooth()">Conectar BT</button>
  </div>

  <div class="set-info" id="setInfo">SET 1 DE 3</div>

  <!-- Sets -->
  <div class="sets-board">
    <div class="sets-team t1">
      <div class="sets-name t1" id="setsName1">Equipo 1</div>
      <div class="sets-dots" id="setsDots1">
        <div class="set-dot" data-i="0"></div>
        <div class="set-dot" data-i="1"></div>
      </div>
    </div>
    <div class="sets-mid">sets</div>
    <div class="sets-team" style="align-items:flex-end">
      <div class="sets-name t2" id="setsName2">Equipo 2</div>
      <div class="sets-dots t2" id="setsDots2">
        <div class="set-dot" data-i="0"></div>
        <div class="set-dot" data-i="1"></div>
      </div>
    </div>
  </div>

  <!-- Main scoreboard -->
  <div class="scoreboard">
    <div class="score-row">
      <div class="score-cell">
        <div class="score-label">Games</div>
        <div class="games-num t1" id="games1">0</div>
      </div>
      <div class="score-divider">—</div>
      <div class="score-cell">
        <div class="score-label">Games</div>
        <div class="games-num t2" id="games2">0</div>
      </div>
    </div>
    <div class="score-sep"></div>
    <div class="score-row">
      <div class="score-cell">
        <div class="score-label">Puntos</div>
        <div class="points-num t1" id="points1">0</div>
      </div>
      <div class="score-divider" style="font-size:14px">pts</div>
      <div class="score-cell">
        <div class="score-label">Puntos</div>
        <div class="points-num t2" id="points2">0</div>
      </div>
    </div>
    <div class="deuce-banner" id="deuceBanner">⚡ DEUCE ⚡</div>
  </div>

  <!-- Point buttons -->
  <div class="action-row">
    <button class="btn-point btn-p1" onclick="addPoint(1)">
      <span>+1 PUNTO</span>
      <span class="hint" id="btnName1">EQUIPO 1</span>
    </button>
    <button class="btn-point btn-p2" onclick="addPoint(2)">
      <span>+1 PUNTO</span>
      <span class="hint" id="btnName2">EQUIPO 2</span>
    </button>
  </div>

  <div class="util-row">
    <button class="btn-util btn-undo" onclick="undo()">↩ Deshacer</button>
    <button class="btn-util btn-reset" onclick="resetMatch()">🔄 Reiniciar</button>
  </div>
</div>

<!-- WINNER SCREEN -->
<div class="screen" id="winnerScreen">
  <div class="winner-glow"></div>
  <div class="trophy">🏆</div>
  <div class="winner-label">Ganador del partido</div>
  <div class="winner-name" id="winnerName">Equipo 1</div>
  <div class="winner-score" id="winnerScore">2 — 0</div>
  <button class="btn-newmatch" onclick="newMatch()">NUEVO PARTIDO</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const POINTS_MAP = ['0','15','30','40'];

let state = {};
let prev = null;
let btDevice = null;
let btChar = null;
let btClickCount = 0;
let btClickTimer = null;

function initState(t1, t2) {
  return {
    t1, t2,
    points: [0, 0],
    games: [0, 0],
    sets: [0, 0],
    currentSet: 1,
    deuce: false,
    advantage: 0  // 0=none, 1=team1, 2=team2
  };
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── START ──
function startGame() {
  const t1 = document.getElementById('inp1').value.trim() || 'Equipo 1';
  const t2 = document.getElementById('inp2').value.trim() || 'Equipo 2';
  state = initState(t1, t2);
  prev = null;
  updateDisplay();
  showScreen('gameScreen');
}

// ── DISPLAY ──
function updateDisplay() {
  const s = state;
  // names
  ['setsName1','setsName2'].forEach((id,i) => document.getElementById(id).textContent = i===0 ? s.t1 : s.t2);
  ['btnName1','btnName2'].forEach((id,i) => document.getElementById(id).textContent = (i===0 ? s.t1 : s.t2).toUpperCase().substring(0,12));
  // set info
  document.getElementById('setInfo').textContent = `SET ${s.currentSet} DE 3`;
  // games
  animNum('games1', s.games[0]);
  animNum('games2', s.games[1]);
  // points / deuce
  const banner = document.getElementById('deuceBanner');
  if (s.deuce) {
    banner.classList.add('show');
    if (s.advantage === 1) {
      banner.textContent = `⚡ VENTAJA ${s.t1.toUpperCase()} ⚡`;
      document.getElementById('points1').textContent = 'VEN';
      document.getElementById('points2').textContent = '—';
    } else if (s.advantage === 2) {
      banner.textContent = `⚡ VENTAJA ${s.t2.toUpperCase()} ⚡`;
      document.getElementById('points1').textContent = '—';
      document.getElementById('points2').textContent = 'VEN';
    } else {
      banner.textContent = '⚡ DEUCE ⚡';
      document.getElementById('points1').textContent = '40';
      document.getElementById('points2').textContent = '40';
    }
  } else {
    banner.classList.remove('show');
    document.getElementById('points1').textContent = POINTS_MAP[s.points[0]] ?? '0';
    document.getElementById('points2').textContent = POINTS_MAP[s.points[1]] ?? '0';
  }
  // set dots
  updateSetDots('setsDots1', s.sets[0], 't1');
  updateSetDots('setsDots2', s.sets[1], 't2');
}

function animNum(id, val) {
  const el = document.getElementById(id);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 200);
  }
}

function updateSetDots(containerId, won, cls) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.set-dot').forEach((dot, i) => {
    dot.className = 'set-dot' + (i < won ? ` won ${cls}` : '');
  });
}

// ── GAME LOGIC ──
function addPoint(team) {
  prev = JSON.parse(JSON.stringify(state));
  const idx = team - 1;
  const opp = 1 - idx;
  const s = state;

  if (s.deuce) {
    if (s.advantage === 0) {
      s.advantage = team;
    } else if (s.advantage === team) {
      winGame(team);
    } else {
      s.advantage = 0; // back to deuce
    }
  } else {
    // Check if adding this point creates deuce
    if (s.points[idx] === 3 && s.points[opp] === 3) {
      // both at 40, next point = deuce situation (shouldn't reach since we handle 40-40)
      s.deuce = true; s.advantage = team;
    } else if (s.points[idx] === 3 && s.points[opp] < 3) {
      winGame(team);
    } else if (s.points[idx] === 2 && s.points[opp] === 3) {
      // 30-40, scoring team at 30 → goes to 40-40 = deuce
      s.points[idx]++;
      s.deuce = true; s.advantage = 0;
    } else {
      s.points[idx]++;
    }
  }
  updateDisplay();
  vibrate(30);
}

function winGame(team) {
  const idx = team - 1;
  state.points = [0, 0];
  state.deuce = false;
  state.advantage = 0;
  state.games[idx]++;
  checkSetWin(team);
}

function checkSetWin(team) {
  const idx = team - 1;
  const opp = 1 - idx;
  const g = state.games;
  // Win if >=6 and ahead by 2
  if (g[idx] >= 6 && g[idx] - g[opp] >= 2) {
    winSet(team);
  }
}

function winSet(team) {
  const idx = team - 1;
  state.games = [0, 0];
  state.sets[idx]++;
  if (state.sets[idx] >= 2) {
    showWinner(team);
  } else {
    state.currentSet++;
  }
}

function showWinner(team) {
  const idx = team - 1;
  document.getElementById('winnerName').textContent = idx === 0 ? state.t1 : state.t2;
  document.getElementById('winnerScore').textContent = `${state.sets[0]} — ${state.sets[1]}`;
  updateDisplay();
  setTimeout(() => showScreen('winnerScreen'), 300);
  vibrate([100, 50, 100, 50, 200]);
}

function undo() {
  if (!prev) { showToast('No hay nada que deshacer'); return; }
  state = prev;
  prev = null;
  updateDisplay();
  vibrate(20);
}

function resetMatch() {
  if (confirm('¿Reiniciar el partido?')) {
    state = initState(state.t1, state.t2);
    prev = null;
    updateDisplay();
  }
}

function newMatch() {
  showScreen('setupScreen');
}

// ── BLUETOOTH ──
async function connectBluetooth() {
  if (!navigator.bluetooth) {
    showToast('⚠️ Web Bluetooth no disponible. Usa Chrome en Android.');
    return;
  }
  try {
    showToast('Buscando dispositivos...');
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['battery_service', '0000ffe0-0000-1000-8000-00805f9b34fb',
                         'generic_access', 'device_information']
    });
    btDevice.addEventListener('gattserverdisconnected', onBTDisconnected);
    showToast('Conectando...');
    const server = await btDevice.gatt.connect();
    document.getElementById('btDot').classList.add('connected');
    document.getElementById('btStatus').textContent = `✓ ${btDevice.name || 'Botón BT'} conectado`;
    showToast(`✅ Conectado: ${btDevice.name || 'Botón BT'}`);

    // Try to get a notification characteristic (common BT button services)
    try {
      const services = await server.getPrimaryServices();
      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const ch of chars) {
          if (ch.properties.notify || ch.properties.indicate) {
            btChar = ch;
            await ch.startNotifications();
            ch.addEventListener('characteristicvaluechanged', onBTData);
            break;
          }
        }
        if (btChar) break;
      }
    } catch(e) {
      // Volume button approach: listen for keydown events (works on some Android+BT remotes)
      showToast('Modo teclas activado para el botón BT');
    }
  } catch(e) {
    if (e.name !== 'NotFoundError') showToast('Error BT: ' + e.message);
  }
}

function onBTData(event) {
  // Any data received = a click. Count clicks within 400ms window
  registerBTClick();
}

function onBTDisconnected() {
  document.getElementById('btDot').classList.remove('connected');
  document.getElementById('btStatus').textContent = 'Botón BT desconectado';
  btChar = null;
  showToast('Botón BT desconectado');
}

// ── BT CLICK COUNTING (1 click = team1, 2 clicks = team2) ──
function registerBTClick() {
  btClickCount++;
  clearTimeout(btClickTimer);
  btClickTimer = setTimeout(() => {
    const clicks = btClickCount;
    btClickCount = 0;
    if (document.getElementById('gameScreen').classList.contains('active')) {
      if (clicks === 1) addPoint(1);
      else if (clicks >= 2) addPoint(2);
    }
  }, 400);
}

// ── KEYBOARD fallback for BT volume buttons ──
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('gameScreen').classList.contains('active')) return;
  // Volume Up = 1 click, Volume Down = 2 clicks (common BT shutter buttons)
  if (e.key === 'ArrowUp' || e.code === 'VolumeUp' || e.keyCode === 24) {
    e.preventDefault(); registerBTClick();
  }
  if (e.key === 'ArrowDown' || e.code === 'VolumeDown' || e.keyCode === 25) {
    e.preventDefault();
    btClickCount++;
    clearTimeout(btClickTimer);
    btClickTimer = setTimeout(() => {
      addPoint(2); btClickCount = 0;
    }, 400);
  }
});

// ── UTILS ──
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── SERVICE WORKER for PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
